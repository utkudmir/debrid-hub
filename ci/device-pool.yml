schema_version: 1

defaults:
  android_package: com.utkudemir.cue
  ios_bundle_id: com.utkudemir.cue
  signoff_owner: utkudmir

profiles:
  local-fast:
    android:
      - label: latest
        avd: Medium_Phone
        api: 36
        abi: arm64-v8a
        system_image: system-images;android-36;google_apis;arm64-v8a
        device_profile: pixel_8_pro
        class: latest-phone
    ios:
      - label: latest-phone
        class: latest-phone

  ci-pr:
    android:
      - label: latest
        avd: api36-phone
        fallbacks:
          - api35-phone
        api: 36
        abi: arm64-v8a
        system_image: system-images;android-36;google_apis;arm64-v8a
        device_profile: pixel_8_pro
        class: latest-phone
    ios:
      - label: latest-phone
        class: latest-phone

  ci-nightly:
    android:
      - label: min-edge
        avd: api24-phone
        fallbacks:
          - api23-phone
        api: 24
        abi: x86_64
        system_image: system-images;android-24;google_apis;x86_64
        device_profile: pixel_2
        class: min-edge-phone
      - label: latest
        avd: api36-phone
        fallbacks:
          - api35-phone
        api: 36
        abi: arm64-v8a
        system_image: system-images;android-36;google_apis;arm64-v8a
        device_profile: pixel_8_pro
        class: latest-phone
    ios:
      - label: small-screen
        class: small-phone
      - label: large-screen
        class: large-phone

  rc-full:
    includes:
      - ci-pr
      - ci-nightly

maintenance:
  review_triggers:
    - xcode_runtime_update
    - android_api_stable_update
    - monthly
  notes:
    - Keep ci-pr fast and deterministic.
    - Keep rc-full aligned with release-supported device classes.
