name: build-release-candidate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Approved release tag (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    environment: production-app-store
    steps:
      - name: Checkout approved tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set release variables
        run: |
          echo "CUE_MARKETING_VERSION=${INPUT_TAG#v}" >> "$GITHUB_ENV"
          echo "CUE_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
        env:
          INPUT_TAG: ${{ inputs.release_tag }}

      - name: Prepare Android signing input
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/cue-signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/cue-signing/upload.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/cue-signing/upload.jks" >> "$GITHUB_ENV"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android release candidate
        run: ./gradlew :androidApp:bundleRelease

      - name: Prepare Apple signing assets
        run: |
          mkdir -p "$RUNNER_TEMP/cue-signing"
          echo "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cue-signing/certificate.p12"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/cue-signing/profile.mobileprovision"
          echo "$APPLE_EXPORT_OPTIONS_PLIST_BASE64" | base64 --decode > "$RUNNER_TEMP/cue-signing/ExportOptions.plist"
          security create-keychain -p "" "$RUNNER_TEMP/cue-signing/cue.keychain"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/cue-signing/cue.keychain"
          security unlock-keychain -p "" "$RUNNER_TEMP/cue-signing/cue.keychain"
          security import "$RUNNER_TEMP/cue-signing/certificate.p12" -k "$RUNNER_TEMP/cue-signing/cue.keychain" -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$RUNNER_TEMP/cue-signing/cue.keychain"
          security list-keychain -d user -s "$RUNNER_TEMP/cue-signing/cue.keychain"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/cue-signing/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$APPLE_PROVISIONING_PROFILE_NAME.mobileprovision"
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
          APPLE_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.APPLE_EXPORT_OPTIONS_PLIST_BASE64 }}

      - name: Build iOS release candidate archive
        run: |
          ./scripts/generate-ios-project.sh
          xcodebuild \
            -project "$PWD/iosApp/CueHost.xcodeproj" \
            -scheme CueHost \
            -configuration Release \
            -archivePath "$PWD/build/Cue.xcarchive" \
            -destination generic/platform=iOS \
            MARKETING_VERSION="$CUE_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CUE_BUILD_NUMBER" \
            archive

      - name: Export iOS release candidate IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/Cue.xcarchive" \
            -exportPath "$PWD/build/ios-export" \
            -exportOptionsPlist "$RUNNER_TEMP/cue-signing/ExportOptions.plist"

      - name: Stage candidate artifacts
        run: |
          mkdir -p "$PWD/build/release-candidate"
          cp "$(find "$PWD/androidApp/build/outputs" -name '*.aab' | head -n 1)" "$PWD/build/release-candidate/cue-release.aab"
          cp "$(find "$PWD/build/ios-export" -name '*.ipa' | head -n 1)" "$PWD/build/release-candidate/cue-release.ipa"

      - name: Upload candidate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-${{ inputs.release_tag }}
          path: build/release-candidate/
          retention-days: 14
