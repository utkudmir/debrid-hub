name: build-release-candidate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Approved release tag (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-input:
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      - name: Validate release tag
        id: validate
        run: |
          set -euo pipefail
          if [[ ! "$INPUT_RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "release_tag=$INPUT_RELEASE_TAG" >> "$GITHUB_OUTPUT"
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}

  android:
    needs: validate-input
    runs-on: ubuntu-24.04
    environment: production-play-store
    steps:
      - name: Checkout approved tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-input.outputs.release_tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set release variables
        run: |
          echo "CUE_MARKETING_VERSION=${INPUT_TAG#v}" >> "$GITHUB_ENV"
          echo "CUE_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
        env:
          INPUT_TAG: ${{ inputs.release_tag }}

      - name: Prepare Android signing input
        run: |
          : "${ANDROID_KEYSTORE_BASE64:?ANDROID_KEYSTORE_BASE64 is required}"
          mkdir -p "$RUNNER_TEMP/cue-signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/cue-signing/upload.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/cue-signing/upload.jks" >> "$GITHUB_ENV"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android release candidate
        run: |
          : "${ANDROID_KEYSTORE_PATH:?ANDROID_KEYSTORE_PATH is required}"
          : "${ANDROID_KEYSTORE_PASSWORD:?ANDROID_KEYSTORE_PASSWORD is required}"
          : "${ANDROID_KEY_ALIAS:?ANDROID_KEY_ALIAS is required}"
          : "${ANDROID_KEY_PASSWORD:?ANDROID_KEY_PASSWORD is required}"
          ./gradlew :androidApp:bundleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Stage Android candidate artifact
        run: |
          mkdir -p "$PWD/build/release-candidate/android"
          aab_path="$(find "$PWD/androidApp/build/outputs" -name '*.aab' -print -quit)"
          if [[ -z "$aab_path" ]]; then
            echo "No Android AAB found" >&2
            exit 1
          fi
          cp "$aab_path" "$PWD/build/release-candidate/android/cue-release.aab"
          (cd "$PWD/build/release-candidate/android" && shasum -a 256 cue-release.aab > SHA256SUMS)

      - name: Upload Android candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-${{ inputs.release_tag }}-android
          path: build/release-candidate/android/
          retention-days: 30

  ios:
    needs: validate-input
    runs-on: macos-15
    environment: production-app-store
    steps:
      - name: Checkout approved tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-input.outputs.release_tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set release variables
        run: |
          echo "CUE_MARKETING_VERSION=${INPUT_TAG#v}" >> "$GITHUB_ENV"
          echo "CUE_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
        env:
          INPUT_TAG: ${{ inputs.release_tag }}

      - name: Prepare Apple signing assets
        run: |
          : "${APPLE_SIGNING_CERTIFICATE_BASE64:?APPLE_SIGNING_CERTIFICATE_BASE64 is required}"
          : "${APPLE_SIGNING_CERTIFICATE_PASSWORD:?APPLE_SIGNING_CERTIFICATE_PASSWORD is required}"
          : "${APPLE_PROVISIONING_PROFILE_BASE64:?APPLE_PROVISIONING_PROFILE_BASE64 is required}"
          : "${APPLE_PROVISIONING_PROFILE_NAME:?APPLE_PROVISIONING_PROFILE_NAME is required}"
          : "${APPLE_EXPORT_OPTIONS_PLIST_BASE64:?APPLE_EXPORT_OPTIONS_PLIST_BASE64 is required}"
          : "${APPLE_DEVELOPMENT_TEAM_ID:?APPLE_DEVELOPMENT_TEAM_ID is required}"

          mkdir -p "$RUNNER_TEMP/cue-signing"
          echo "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cue-signing/certificate.p12"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/cue-signing/profile.mobileprovision"
          echo "$APPLE_EXPORT_OPTIONS_PLIST_BASE64" | base64 --decode > "$RUNNER_TEMP/cue-signing/ExportOptions.plist"

          keychain_password="$(uuidgen)"
          security create-keychain -p "$keychain_password" "$RUNNER_TEMP/cue-signing/cue.keychain"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/cue-signing/cue.keychain"
          security unlock-keychain -p "$keychain_password" "$RUNNER_TEMP/cue-signing/cue.keychain"
          security import "$RUNNER_TEMP/cue-signing/certificate.p12" -k "$RUNNER_TEMP/cue-signing/cue.keychain" -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$RUNNER_TEMP/cue-signing/cue.keychain"
          security list-keychains -d user -s "$RUNNER_TEMP/cue-signing/cue.keychain"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/cue-signing/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$APPLE_PROVISIONING_PROFILE_NAME.mobileprovision"

          echo "APPLE_EXPORT_OPTIONS_PLIST=$RUNNER_TEMP/cue-signing/ExportOptions.plist" >> "$GITHUB_ENV"
          echo "APPLE_PROVISIONING_PROFILE_NAME=$APPLE_PROVISIONING_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "APPLE_DEVELOPMENT_TEAM_ID=$APPLE_DEVELOPMENT_TEAM_ID" >> "$GITHUB_ENV"
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
          APPLE_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.APPLE_EXPORT_OPTIONS_PLIST_BASE64 }}
          APPLE_DEVELOPMENT_TEAM_ID: ${{ vars.APPLE_DEVELOPMENT_TEAM_ID }}

      - name: Build iOS release candidate archive
        run: |
          ./scripts/generate-ios-project.sh
          xcodebuild \
            -project "$PWD/iosApp/CueHost.xcodeproj" \
            -scheme CueHost \
            -configuration Release \
            -archivePath "$PWD/build/Cue.xcarchive" \
            -destination generic/platform=iOS \
            MARKETING_VERSION="$CUE_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CUE_BUILD_NUMBER" \
            DEVELOPMENT_TEAM="$APPLE_DEVELOPMENT_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$APPLE_PROVISIONING_PROFILE_NAME" \
            archive

      - name: Export iOS release candidate IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/Cue.xcarchive" \
            -exportPath "$PWD/build/ios-export" \
            -exportOptionsPlist "$APPLE_EXPORT_OPTIONS_PLIST"

      - name: Stage iOS candidate artifact
        run: |
          mkdir -p "$PWD/build/release-candidate/ios"
          ipa_path="$(find "$PWD/build/ios-export" -name '*.ipa' -print -quit)"
          if [[ -z "$ipa_path" ]]; then
            echo "No iOS IPA found" >&2
            exit 1
          fi
          cp "$ipa_path" "$PWD/build/release-candidate/ios/cue-release.ipa"
          (cd "$PWD/build/release-candidate/ios" && shasum -a 256 cue-release.ipa > SHA256SUMS)

      - name: Upload iOS candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-${{ inputs.release_tag }}-ios
          path: build/release-candidate/ios/
          retention-days: 30
