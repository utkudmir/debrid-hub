name: dependabot-auto-merge-on-copilot

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.review.user.login == 'copilot' && github.event.review.state == 'approved' && !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    steps:
      - name: Enable auto-merge after Copilot approval
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const pull_number = context.payload.pull_request.number
            const pullRequestId = context.payload.pull_request.node_id

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                { pullRequestId }
              )

              core.info(`Auto-merge enabled for Dependabot PR #${pull_number}.`)
            } catch (error) {
              core.warning(`Could not enable auto-merge: ${error.message}`)
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: [
                  'Automated note: Copilot approved this Dependabot PR but auto-merge could not be enabled.',
                  'Please check repository settings (`Allow auto-merge`) and branch protection requirements.'
                ].join('\n')
              })
            }
