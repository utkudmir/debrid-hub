name: verification

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
    paths:
      - .github/workflows/verify-rc.yml
      - .detekt.yml
      - .swiftlint.yml
      - localization/**
      - Makefile
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradle/**
      - ci/**
      - scripts/**
      - shared/**
      - androidApp/**
      - iosApp/**
      - docs/release-gate.md
      - docs/appstore-review-checklist.md
      - docs/localization.md
  push:
    branches:
      - main
    paths:
      - .github/workflows/verify-rc.yml
      - .detekt.yml
      - .swiftlint.yml
      - localization/**
      - Makefile
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradle/**
      - ci/**
      - scripts/**
      - shared/**
      - androidApp/**
      - iosApp/**
      - docs/release-gate.md
      - docs/appstore-review-checklist.md
      - docs/localization.md
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      verify_profile:
        description: Device pool profile to run
        required: false
        type: choice
        default: ci-pr
        options:
          - ci-pr
          - ci-nightly
          - rc-full

concurrency:
  group: verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  plan-verification:
    name: Plan verification
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    outputs:
      enabled: ${{ steps.plan.outputs.enabled }}
      verify_profile: ${{ steps.plan.outputs.verify_profile }}
      android_matrix: ${{ steps.plan.outputs.android_matrix }}
      ios_matrix: ${{ steps.plan.outputs.ios_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect verification-relevant changes
        id: relevant-changes
        uses: actions/github-script@v7
        with:
          script: |
            const exactMatches = new Set([
              '.github/workflows/verify-rc.yml',
              '.detekt.yml',
              '.swiftlint.yml',
              'Makefile',
              'build.gradle.kts',
              'settings.gradle.kts',
              'gradle.properties',
              'docs/release-gate.md',
              'docs/appstore-review-checklist.md',
              'docs/localization.md'
            ])

            const prefixMatches = [
              'localization/',
              'gradle/',
              'ci/',
              'scripts/',
              'shared/',
              'androidApp/',
              'iosApp/'
            ]

            if (context.eventName === 'schedule' || context.eventName === 'workflow_dispatch') {
              core.setOutput('relevant', 'true')
              core.info(`Skipping change detection for ${context.eventName}.`)
              return
            }

            let changedFiles = []
            if (context.eventName === 'pull_request') {
              changedFiles = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              })
              changedFiles = changedFiles.map((file) => file.filename)
            } else if (context.eventName === 'push') {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${context.payload.before}...${context.payload.after}`
              })
              changedFiles = (comparison.data.files || []).map((file) => file.filename)
            }

            const relevant = changedFiles.some((file) => exactMatches.has(file) || prefixMatches.some((prefix) => file.startsWith(prefix)))
            core.setOutput('relevant', relevant ? 'true' : 'false')
            core.info(`Changed files (${changedFiles.length}): ${changedFiles.join(', ') || 'none'}`)
            core.info(`Verification-relevant changes detected: ${relevant}`)

      - name: Resolve profile and device matrix
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          echo "== verification precheck =="
          echo "event: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "schedule gate variable ENABLE_RC_FULL_SCHEDULE='${{ vars.ENABLE_RC_FULL_SCHEDULE }}'"

          effective_profile="ci-pr"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            effective_profile="ci-nightly"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.verify_profile }}" ]]; then
            effective_profile="${{ github.event.inputs.verify_profile }}"
          fi

          echo "verify_profile=$effective_profile" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "schedule" && "${{ vars.ENABLE_RC_FULL_SCHEDULE }}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled verification run: ENABLE_RC_FULL_SCHEDULE is not 'true'."
          elif [[ "${{ steps.relevant-changes.outputs.relevant }}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping verification: no verification-relevant files changed."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

          android_matrix="$(ruby scripts/device-pool-matrix.rb "$effective_profile" android)"
          ios_matrix="$(ruby scripts/device-pool-matrix.rb "$effective_profile" ios)"

          echo "android matrix: $android_matrix"
          echo "ios matrix: $ios_matrix"

          echo "android_matrix=$android_matrix" >> "$GITHUB_OUTPUT"
          echo "ios_matrix=$ios_matrix" >> "$GITHUB_OUTPUT"

  shared-quality:
    name: Shared static analysis and tests
    needs: plan-verification
    if: needs['plan-verification'].outputs.enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (cached)
        if: github.event_name != 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up JDK 21
        if: github.event_name == 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run localization checks, shared static analysis, and tests
        shell: bash
        run: |
          set -euo pipefail
          make localization-check
          make shared-static-analysis
          make shared-test

      - name: Upload shared diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics-shared
          path: |
            shared/build/reports/
            shared/build/test-results/
            build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore

  android-static-analysis:
    name: Android static analysis
    needs: plan-verification
    if: needs['plan-verification'].outputs.enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (cached)
        if: github.event_name != 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up JDK 21
        if: github.event_name == 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run Android lint
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :androidApp:lint

      - name: Upload Android static analysis diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics-android-static-analysis
          path: |
            androidApp/build/reports/
            build/reports/
          retention-days: 7
          if-no-files-found: ignore

  android-automated-tests:
    name: Android automated tests (${{ matrix.label }})
    needs:
      - plan-verification
      - android-static-analysis
    if: needs['plan-verification'].outputs.enabled == 'true'
    runs-on: ${{ vars.ANDROID_EMULATOR_RUNNER != '' && vars.ANDROID_EMULATOR_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs['plan-verification'].outputs.android_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (cached)
        if: github.event_name != 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up JDK 21
        if: github.event_name == 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Enable KVM group perms
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -e /dev/kvm ]]; then
            echo "/dev/kvm is not available on this runner; Android Emulator will fall back to software virtualization."
            exit 0
          fi
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Android AVD snapshot
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ runner.os }}-${{ matrix.api_level }}-${{ matrix.target }}-${{ matrix.arch }}-${{ matrix.avd_name }}-v1

      - name: Create Android AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api_level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.device_profile }}
          avd-name: ${{ matrix.avd_name }}
          force-avd-creation: false
          disable-linux-hw-accel: auto
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated cached AVD snapshot for ${{ matrix.label }}"

      - name: Run Android unit and instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api_level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.device_profile }}
          avd-name: ${{ matrix.avd_name }}
          force-avd-creation: false
          disable-linux-hw-accel: auto
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :androidApp:testDebugUnitTest :androidApp:assembleDebug :androidApp:connectedDebugAndroidTest

      - name: Upload Android debug APK for launch smoke
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ matrix.slug }}
          path: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          retention-days: 1
          if-no-files-found: error

      - name: Upload Android automated test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics-android-tests-${{ matrix.slug }}
          path: |
            androidApp/build/reports/
            androidApp/build/test-results/
            androidApp/build/reports/androidTests/connected/
            androidApp/build/outputs/androidTest-results/connected/
          retention-days: 7
          if-no-files-found: ignore

  android-launch-smoke:
    name: Android launch smoke (${{ matrix.label }})
    needs:
      - plan-verification
      - android-automated-tests
    if: needs['plan-verification'].outputs.enabled == 'true'
    runs-on: ${{ vars.ANDROID_EMULATOR_RUNNER != '' && vars.ANDROID_EMULATOR_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs['plan-verification'].outputs.android_matrix) }}
    env:
      ANDROID_VERIFY_LOG_DIR: ${{ github.workspace }}/build/rc-verify/android/${{ matrix.slug }}
      ANDROID_PACKAGE: app.debridhub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (cached)
        if: github.event_name != 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up JDK 21
        if: github.event_name == 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Enable KVM group perms
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -e /dev/kvm ]]; then
            echo "/dev/kvm is not available on this runner; Android Emulator will fall back to software virtualization."
            exit 0
          fi
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Android debug APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk-${{ matrix.slug }}
          path: androidApp/build/outputs/apk/debug/

      - name: Cache Android AVD snapshot
        id: avd-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ runner.os }}-${{ matrix.api_level }}-${{ matrix.target }}-${{ matrix.arch }}-${{ matrix.avd_name }}-v1

      - name: Run Android launch smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api_level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.device_profile }}
          avd-name: ${{ matrix.avd_name }}
          force-avd-creation: false
          disable-linux-hw-accel: auto
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./scripts/verify-android-emulator.sh "androidApp/build/outputs/apk/debug/androidApp-debug.apk" "$ANDROID_PACKAGE"

      - name: Upload Android launch smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics-android-smoke-${{ matrix.slug }}
          path: build/rc-verify/android/${{ matrix.slug }}/
          retention-days: 7
          if-no-files-found: ignore

  ios-static-analysis:
    name: iOS static analysis
    needs: plan-verification
    if: needs['plan-verification'].outputs.enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        shell: bash
        run: |
          set -euo pipefail
          HOMEBREW_NO_AUTO_UPDATE=1 brew install swiftlint

      - name: Run iOS SwiftLint
        shell: bash
        run: |
          set -euo pipefail
          make ios-lint

      - name: Upload iOS static analysis diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics-ios-static-analysis
          path: .swiftlint.yml
          retention-days: 7
          if-no-files-found: ignore

  ios-automated-tests:
    name: iOS automated tests (${{ matrix.label }})
    needs:
      - plan-verification
      - ios-static-analysis
    if: needs['plan-verification'].outputs.enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs['plan-verification'].outputs.ios_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (cached)
        if: github.event_name != 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up JDK 21
        if: github.event_name == 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run iOS XCTest suite
        shell: bash
        run: |
          set -euo pipefail
          IOS_SIMULATOR_NAME="${{ matrix.simulator_name }}" IOS_DEVICE_CLASS="${{ matrix.device_class }}" make ios-test

      - name: Upload iOS build products for launch smoke
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-products-${{ matrix.slug }}
          path: build/ios-derived-data/Build/Products/Debug-iphonesimulator/
          retention-days: 1
          if-no-files-found: error

      - name: Upload iOS automated test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics-ios-tests-${{ matrix.slug }}
          path: |
            build/ios-derived-data/Logs/
            build/ci-logs/
          retention-days: 7
          if-no-files-found: ignore

  ios-launch-smoke:
    name: iOS launch smoke (${{ matrix.label }})
    needs:
      - plan-verification
      - ios-automated-tests
    if: needs['plan-verification'].outputs.enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs['plan-verification'].outputs.ios_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (cached)
        if: github.event_name != 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up JDK 21
        if: github.event_name == 'pull_request'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download iOS build products
        uses: actions/download-artifact@v4
        with:
          name: ios-build-products-${{ matrix.slug }}
          path: build/ios-derived-data/Build/Products/Debug-iphonesimulator/

      - name: Run iOS launch smoke
        shell: bash
        run: |
          set -euo pipefail
          IOS_SIMULATOR_NAME="${{ matrix.simulator_name }}" IOS_DEVICE_CLASS="${{ matrix.device_class }}" IOS_SKIP_BUILD=1 make ios-run

      - name: Upload iOS launch smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics-ios-smoke-${{ matrix.slug }}
          path: |
            build/ios-derived-data/Logs/
            build/ci-logs/
          retention-days: 7
          if-no-files-found: ignore

  final-verification-gate:
    name: Final verification gate
    needs:
      - plan-verification
      - shared-quality
      - android-static-analysis
      - android-automated-tests
      - android-launch-smoke
      - ios-static-analysis
      - ios-automated-tests
      - ios-launch-smoke
    if: always() && needs['plan-verification'].outputs.enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      VERIFY_PROFILE: ${{ needs['plan-verification'].outputs.verify_profile }}
      STEP_COMMAND_TIMEOUT_SECONDS: "1800"
    steps:
      - name: Validate required verification jobs
        shell: bash
        run: |
          set -euo pipefail
          echo "shared-quality result: ${{ needs['shared-quality'].result }}"
          echo "android-static-analysis result: ${{ needs['android-static-analysis'].result }}"
          echo "android-automated-tests result: ${{ needs['android-automated-tests'].result }}"
          echo "android-launch-smoke result: ${{ needs['android-launch-smoke'].result }}"
          echo "ios-static-analysis result: ${{ needs['ios-static-analysis'].result }}"
          echo "ios-automated-tests result: ${{ needs['ios-automated-tests'].result }}"
          echo "ios-launch-smoke result: ${{ needs['ios-launch-smoke'].result }}"
          for result in \
            "${{ needs['shared-quality'].result }}" \
            "${{ needs['android-static-analysis'].result }}" \
            "${{ needs['android-automated-tests'].result }}" \
            "${{ needs['android-launch-smoke'].result }}" \
            "${{ needs['ios-static-analysis'].result }}" \
            "${{ needs['ios-automated-tests'].result }}" \
            "${{ needs['ios-launch-smoke'].result }}"; do
            if [[ "$result" != "success" ]]; then
              echo "At least one verification lane did not succeed" >&2
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run compliance and sign-off gate
        shell: bash
        env:
          VERIFY_RC_SCOPE: gate
        run: |
          set -euo pipefail
          make verify-rc

      - name: Upload gate diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics-gate
          path: build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore
