name: verify-rc

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
    paths:
      - .github/workflows/verify-rc.yml
      - Makefile
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradle/**
      - ci/**
      - scripts/**
      - shared/**
      - androidApp/**
      - iosApp/**
      - docs/release-gate.md
      - docs/appstore-review-checklist.md
  push:
    branches:
      - main
    paths:
      - .github/workflows/verify-rc.yml
      - Makefile
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradle/**
      - ci/**
      - scripts/**
      - shared/**
      - androidApp/**
      - iosApp/**
      - docs/release-gate.md
      - docs/appstore-review-checklist.md
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      verify_profile:
        description: Device pool profile to run
        required: false
        type: choice
        default: rc-full
        options:
          - ci-pr
          - ci-nightly
          - rc-full

concurrency:
  group: verify-rc-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  VERIFY_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.verify_profile || (github.event_name == 'schedule' && 'rc-full' || 'ci-pr') }}

jobs:
  schedule-gate:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    outputs:
      enabled: ${{ steps.schedule_gate.outputs.enabled }}
      verify_profile: ${{ steps.schedule_gate.outputs.verify_profile }}
    steps:
      - name: Schedule gate precheck
        id: schedule_gate
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-rc precheck =="
          echo "event: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "requested profile: $VERIFY_PROFILE"
          echo "schedule gate variable ENABLE_RC_FULL_SCHEDULE='${{ vars.ENABLE_RC_FULL_SCHEDULE }}'"
          echo "verify_profile=$VERIFY_PROFILE" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "schedule" && "${{ vars.ENABLE_RC_FULL_SCHEDULE }}" != "true" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled rc-full run: ENABLE_RC_FULL_SCHEDULE is not 'true'."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              echo "Scheduled rc-full run is enabled by ENABLE_RC_FULL_SCHEDULE=true."
            else
              echo "Non-schedule event; proceeding with verify-rc workflow."
            fi
          fi
          echo "effective profile: $VERIFY_PROFILE"

  verify-shared:
    needs: schedule-gate
    if: needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 90
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
      STEP_COMMAND_TIMEOUT_SECONDS: "1800"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-shared workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "repository: $GITHUB_REPOSITORY"
          echo "run id: $GITHUB_RUN_ID"
          echo "run attempt: $GITHUB_RUN_ATTEMPT"
          echo "actor: $GITHUB_ACTOR"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Verify Shared
        shell: bash
        env:
          VERIFY_RC_SCOPE: shared
        run: |
          set -euo pipefail
          echo "== verify shared scope =="
          echo "profile: $VERIFY_PROFILE"
          make verify-rc

      - name: Upload RC artifacts (shared)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-verify-shared-artifacts
          path: build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore

  verify-android:
    needs: schedule-gate
    if: needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      STEP_COMMAND_TIMEOUT_SECONDS: "1800"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-android workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "android sdk root: $ANDROID_SDK_ROOT"
          echo "repository: $GITHUB_REPOSITORY"
          echo "run id: $GITHUB_RUN_ID"
          echo "run attempt: $GITHUB_RUN_ATTEMPT"
          echo "actor: $GITHUB_ACTOR"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER_BIN=""
          for candidate in \
            "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager" \
            "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"; do
            if [[ -x "$candidate" ]]; then
              SDKMANAGER_BIN="$candidate"
              break
            fi
          done
          if [[ -z "$SDKMANAGER_BIN" ]]; then
            echo "sdkmanager not found under $ANDROID_SDK_ROOT" >&2
            exit 1
          fi
          echo "using sdkmanager: $SDKMANAGER_BIN"
          set +o pipefail
          if ! yes | "$SDKMANAGER_BIN" --licenses >/dev/null; then
            echo "Failed to accept Android SDK licenses" >&2
            exit 1
          fi
          set -o pipefail
          echo "android sdk licenses accepted"

      - name: Install Android emulator runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpulse0 \
            libnss3 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxi6 \
            libxrandr2 \
            libxdamage1 \
            libxtst6 \
            libgl1 \
            libegl1

      - name: Ensure Android emulator tooling
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER_BIN=""
          for candidate in \
            "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager" \
            "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"; do
            if [[ -x "$candidate" ]]; then
              SDKMANAGER_BIN="$candidate"
              break
            fi
          done
          if [[ -z "$SDKMANAGER_BIN" ]]; then
            echo "sdkmanager not found under $ANDROID_SDK_ROOT" >&2
            exit 1
          fi
          echo "using sdkmanager: $SDKMANAGER_BIN"
          set +o pipefail
          if ! yes | "$SDKMANAGER_BIN" --install "platform-tools" "emulator" >/dev/null; then
            echo "Failed to install Android emulator tooling" >&2
            exit 1
          fi
          set -o pipefail
          if [[ ! -x "$ANDROID_SDK_ROOT/emulator/emulator" ]]; then
            echo "Android emulator binary is still missing: $ANDROID_SDK_ROOT/emulator/emulator" >&2
            exit 1
          fi
          "$ANDROID_SDK_ROOT/emulator/emulator" -version
          "$ANDROID_SDK_ROOT/platform-tools/adb" --version

      - name: Provision Device Pool
        shell: bash
        run: |
          set -euo pipefail
          echo "== provisioning device pool =="
          echo "profile: $VERIFY_PROFILE"
          PROVISION_TARGETS=android make provision-devices
          echo "device pool provisioning completed"

      - name: Verify Android
        shell: bash
        env:
          VERIFY_RC_SCOPE: android
        run: |
          set -euo pipefail
          echo "== verify android scope =="
          echo "profile: $VERIFY_PROFILE"
          make verify-rc

      - name: Upload RC artifacts (android)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-verify-android-artifacts
          path: build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore

  verify-ios:
    needs: schedule-gate
    if: needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: macos-15
    timeout-minutes: 180
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
      STEP_COMMAND_TIMEOUT_SECONDS: "1800"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-ios workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "repository: $GITHUB_REPOSITORY"
          echo "run id: $GITHUB_RUN_ID"
          echo "run attempt: $GITHUB_RUN_ATTEMPT"
          echo "actor: $GITHUB_ACTOR"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Provision Device Pool
        shell: bash
        run: |
          set -euo pipefail
          echo "== provisioning device pool =="
          echo "profile: $VERIFY_PROFILE"
          PROVISION_TARGETS=ios make provision-devices
          echo "device pool provisioning completed"

      - name: Verify iOS
        shell: bash
        env:
          VERIFY_RC_SCOPE: ios
        run: |
          set -euo pipefail
          echo "== verify ios scope =="
          echo "profile: $VERIFY_PROFILE"
          make verify-rc

      - name: Upload RC artifacts (ios)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-verify-ios-artifacts
          path: build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore

  verify-gate:
    needs:
      - schedule-gate
      - verify-shared
      - verify-android
      - verify-ios
    if: always() && needs['schedule-gate'].outputs.enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      VERIFY_PROFILE: ${{ needs['schedule-gate'].outputs.verify_profile }}
      STEP_COMMAND_TIMEOUT_SECONDS: "1800"
    steps:
      - name: Validate required platform jobs
        shell: bash
        run: |
          set -euo pipefail
          echo "verify-shared result: ${{ needs['verify-shared'].result }}"
          echo "verify-android result: ${{ needs['verify-android'].result }}"
          echo "verify-ios result: ${{ needs['verify-ios'].result }}"
          if [[ "${{ needs['verify-shared'].result }}" != "success" ]]; then
            echo "verify-shared did not succeed" >&2
            exit 1
          fi
          if [[ "${{ needs['verify-android'].result }}" != "success" ]]; then
            echo "verify-android did not succeed" >&2
            exit 1
          fi
          if [[ "${{ needs['verify-ios'].result }}" != "success" ]]; then
            echo "verify-ios did not succeed" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow context
        shell: bash
        run: |
          set -euo pipefail
          echo "== verify-gate workflow context =="
          echo "runner: $RUNNER_NAME"
          echo "runner os: $RUNNER_OS"
          echo "runner arch: $RUNNER_ARCH"
          echo "workspace: $GITHUB_WORKSPACE"
          echo "profile: $VERIFY_PROFILE"
          echo "repository: $GITHUB_REPOSITORY"
          echo "run id: $GITHUB_RUN_ID"
          echo "run attempt: $GITHUB_RUN_ATTEMPT"
          echo "actor: $GITHUB_ACTOR"

      - name: Verify Gate
        shell: bash
        env:
          VERIFY_RC_SCOPE: gate
        run: |
          set -euo pipefail
          echo "== verify gate scope =="
          echo "profile: $VERIFY_PROFILE"
          make verify-rc

      - name: Upload RC artifacts (gate)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-verify-gate-artifacts
          path: build/rc-verify/
          retention-days: 7
          if-no-files-found: ignore
