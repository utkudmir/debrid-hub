name: cache-hygiene

on:
  schedule:
    - cron: "15 4,16 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: write
  contents: read

jobs:
  trim-caches:
    runs-on: ubuntu-24.04
    steps:
      - name: Delete stale Actions caches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const now = Date.now()
            const keepForMs = 3 * 24 * 60 * 60 * 1000

            const stalePrefixes = [
              'android-debug-apk-',
              'ios-derived-data-'
            ]

            const response = await github.rest.actions.getActionsCacheList({
              owner,
              repo,
              per_page: 100
            })

            let deleted = 0
            for (const cache of response.data.actions_caches || []) {
              const key = cache.key || ''
              const ageMs = now - Date.parse(cache.last_accessed_at)
              const isStalePrefix = stalePrefixes.some((prefix) => key.startsWith(prefix))

              if (isStalePrefix || ageMs > keepForMs) {
                await github.rest.actions.deleteActionsCacheById({
                  owner,
                  repo,
                  cache_id: cache.id
                })
                deleted += 1
                core.info(`Deleted cache ${cache.id} (${key})`)
              }
            }

            core.info(`Cache hygiene complete. Deleted ${deleted} cache entries.`)
