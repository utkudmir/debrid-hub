name: security-secrets

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-tracked-secrets:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tracked-file secret scan
        shell: bash
        run: scripts/scan-secrets.sh
