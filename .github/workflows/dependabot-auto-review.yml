name: dependabot-auto-review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  request-copilot-review:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    steps:
      - name: Request Copilot review
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const pull_number = context.payload.pull_request.number

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ['copilot']
              })
              core.info('Copilot reviewer requested successfully.')
            } catch (error) {
              core.warning(`Copilot reviewer request failed: ${error.message}`)
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: [
                  'Automated note: Could not request Copilot as an explicit reviewer for this repository.',
                  '',
                  '@copilot review'
                ].join('\n')
              })
            }
