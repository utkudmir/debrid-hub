    trust_center.about_line_2: "Die App implementiert derzeit weder Unrestrict, Downloads, Torrent-Verwaltung, Streaming, das Teilen generierter Links noch Multi-User-Kontoverwaltung."
    trust_center.about_line_3: "DebridHub verwendet offizielle Real-Debrid-API-Endpunkte und den dokumentierten Device-Auth-Flow. Nutzer bleiben selbst dafür verantwortlich, die Real-Debrid-Bedingungen und Kontoregeln einzuhalten."
