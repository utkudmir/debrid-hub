    trust_center.hero_title: "Voyez exactement comment DebridHub gère l’authentification, le stockage, les diagnostics et les limites fonctionnelles."
    trust_center.hero_body: "Il s’agit d’un texte produit dans l’app basé sur l’implémentation actuelle, pas d’une couche marketing ni d’une vue web."
    trust_center.privacy_title: "Confidentialité"
    trust_center.privacy_line_1: "DebridHub n’a pas de backend. L’app communique directement avec Real-Debrid depuis votre appareil."
    trust_center.privacy_line_2: "Il n’y a ni SDK analytique, ni pixel de suivi, ni service de rapport de crash, ni synchronisation distante de compte dans l’app actuelle."
    trust_center.privacy_line_3: "Les notifications de rappel sont locales à cet appareil et sont planifiées à partir de l’état du compte stocké localement."
    trust_center.privacy_line_4: "L’export des diagnostics est manuel. Rien n’est envoyé nulle part, sauf si vous partagez explicitement le fichier exporté."
    trust_center.security_title: "Sécurité"
    trust_center.security_line_1: "L’authentification utilise le flux officiel OAuth2 Device Flow de Real-Debrid plutôt qu’une collecte de mot de passe."
    trust_center.security_line_2_android: "Android stocke l’état d’authentification avec EncryptedSharedPreferences."
    trust_center.security_line_2_ios: "iOS stocke l’état d’authentification dans le Trousseau et migre l’ancien état NSUserDefaults lors de la première lecture."
    trust_center.security_line_3: "Se déconnecter efface l’état d’authentification enregistré et annule les rappels. DebridHub n’a pas besoin d’un serveur compagnon pour fonctionner."
    trust_center.diagnostics_title: "Diagnostics"
