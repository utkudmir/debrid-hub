    trust_center.hero_title: "Mira exactamente cómo DebridHub gestiona la autenticación, el almacenamiento, los diagnósticos y los límites de la función."
    trust_center.hero_body: "Este texto del producto dentro de la app se basa en la implementación actual, no en una capa de marketing ni en una vista web."
    trust_center.privacy_title: "Privacidad"
    trust_center.privacy_line_1: "DebridHub no tiene backend. La app se comunica directamente con Real-Debrid desde tu dispositivo."
    trust_center.privacy_line_2: "No hay SDK de analítica, píxel de seguimiento, servicio de informes de fallos ni sincronización remota de la cuenta en la app actual."
    trust_center.privacy_line_3: "Las notificaciones de recordatorio son locales a este dispositivo y se programan usando el estado de la cuenta almacenado localmente."
    trust_center.privacy_line_4: "La exportación de diagnósticos es manual. No se envía nada a ningún sitio a menos que compartas explícitamente el archivo exportado."
    trust_center.security_title: "Seguridad"
    trust_center.security_line_1: "La autenticación usa el flujo oficial OAuth2 Device Flow de Real-Debrid en lugar de pedir tu contraseña."
    trust_center.security_line_2_android: "Android almacena el estado de autenticación con EncryptedSharedPreferences."
    trust_center.security_line_2_ios: "iOS almacena el estado de autenticación en Keychain y migra el estado heredado de NSUserDefaults en la primera lectura."
    trust_center.security_line_3: "Desconectar borra el estado de autenticación guardado y cancela los recordatorios. DebridHub no necesita un servidor complementario para funcionar."
    trust_center.diagnostics_title: "Diagnósticos"
    trust_center.diagnostics_line_1: "La exportación de diagnósticos incluye actualmente la versión de la app, la versión del sistema operativo, la última sincronización, el estado de vencimiento de la cuenta y algunas marcas de ejecución no sensibles."
    trust_center.diagnostics_line_2: "La exportación de diagnósticos excluye tokens de acceso, tokens de actualización, secretos de cliente, nombre de usuario, correo electrónico e historial completo de la cuenta."
    trust_center.preview_unavailable: "La vista previa de diagnósticos todavía no está disponible."
    trust_center.about_title: "Acerca de y cumplimiento"
    trust_center.about_line_1: "El alcance actual es intencionadamente reducido: autenticación de cuenta, lectura del estado de la cuenta, programación local de recordatorios y exportación local de diagnósticos."
    trust_center.about_line_2: "La app no implementa actualmente desbloqueo, descargas, gestión de torrents, streaming, uso compartido de enlaces generados ni gestión multiusuario."
    trust_center.about_line_3: "DebridHub usa los endpoints oficiales de la API de Real-Debrid y el flujo de autenticación por dispositivo documentado. Los usuarios siguen siendo responsables de cumplir los Términos y las reglas de cuenta de Real-Debrid."
