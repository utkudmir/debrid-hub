    trust_center.hero_body: "Dies ist In-App-Produkttext basierend auf der aktuellen Implementierung, keine Marketing-Schicht und keine Webansicht."
    trust_center.privacy_title: "Datenschutz"
    trust_center.privacy_line_1: "DebridHub hat kein Backend. Die App spricht direkt von deinem Gerät mit Real-Debrid."
    trust_center.privacy_line_2: "Es gibt in der aktuellen App kein Analyse-SDK, kein Tracking-Pixel, keinen Crash-Reporting-Dienst und keine Kontosynchronisierung über einen Server."
    trust_center.privacy_line_3: "Erinnerungsbenachrichtigungen sind lokal auf diesem Gerät und werden anhand des lokal gespeicherten Kontostatus geplant."
    trust_center.privacy_line_4: "Der Diagnoseexport ist manuell. Es wird nichts irgendwohin gesendet, es sei denn, du teilst die exportierte Datei ausdrücklich selbst."
    trust_center.security_title: "Sicherheit"
    trust_center.security_line_1: "Die Authentifizierung verwendet den offiziellen OAuth2-Device-Flow von Real-Debrid statt einer Passworteingabe."
    trust_center.security_line_2_android: "Android speichert den Authentifizierungsstatus mit EncryptedSharedPreferences."
    trust_center.security_line_2_ios: "iOS speichert den Authentifizierungsstatus im Schlüsselbund und migriert beim ersten Lesen den alten NSUserDefaults-Status."
    trust_center.security_line_3: "Beim Trennen werden gespeicherter Authentifizierungsstatus gelöscht und Erinnerungen abgebrochen. DebridHub benötigt keinen Begleitserver, um zu funktionieren."
    trust_center.diagnostics_title: "Diagnosen"
    trust_center.diagnostics_line_1: "Der Diagnoseexport enthält derzeit die App-Version, die OS-Version, den Zeitstempel der letzten Synchronisierung, den Ablaufstatus des Kontos und begrenzte nicht sensible Laufzeitflags."
    trust_center.diagnostics_line_2: "Der Diagnoseexport schließt Zugriffstokens, Refresh-Tokens, Client-Secrets, Benutzernamen, E-Mail-Adresse und den vollständigen Kontoverlauf aus."
